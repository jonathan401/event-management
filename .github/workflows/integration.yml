name: Integration Workflow

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📚 Install Packages
        run: npm ci

      - name: 🔒 Check for lockfile synchronization
        run: git diff --exit-code package-lock.json || (echo "Lockfile is out of sync. Please run 'npm i' to update it." && exit 1)

      - name: 📝Check for formatting issues
        run: npm run format:check

      - name: 🕵️ Check for linting issues
        run: npm run lint

      - name: 🏗️ Build dist
        run: npm run build

      - name: 🧪 Run tests
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          PORT: 3000
          ACCESS_TOKEN_SECRET: 'test-secret'
        run: npm test
